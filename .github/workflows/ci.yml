name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Format check
        run: cargo fmt --all -- --check

  msrv:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88
      - uses: Swatinem/rust-cache@v2
      - name: Check MSRV
        run: cargo check --workspace --all-targets

  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build
        run: cargo build --workspace --all-targets

      - uses: ilammy/msvc-dev-cmd@v1

      - name: Verify C header
        run: |
          cl /c /W4 /I crates/winpane-ffi/include crates/winpane-ffi/include/winpane.h
        shell: cmd

      - name: Verify winpane-host binary
        run: |
          test -f target/debug/winpane-host.exe
        shell: bash

      - name: Test
        run: cargo test --workspace

  coverage:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - name: Generate coverage
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info
      - uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}

  node-addon:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: bindings/node

      - name: Format check (node addon)
        run: cargo fmt --manifest-path bindings/node/Cargo.toml -- --check

      - name: Install dependencies
        run: npm install
        working-directory: bindings/node

      - name: Build native addon
        run: npm run build
        working-directory: bindings/node

      - name: Verify artifacts
        run: |
          test -f index.js
          test -f index.d.ts
          ls -la *.node
        working-directory: bindings/node
        shell: bash
